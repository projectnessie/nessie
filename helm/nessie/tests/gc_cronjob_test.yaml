release:
  name: nessie
  namespace: nessie-ns

templates:
  - gc-cronjob.yaml

tests:
  - it: should not render a CronJob by default (gc disabled)
    asserts:
      - hasDocuments:
          count: 0
  - it: should render exactly one CronJob when gc.enabled is true
    set:
      gc:
        enabled: true
        schedule: "0 3 * * *"
        args: [ "gc" ]
    asserts:
      - hasDocuments:
          count: 1
      - containsDocument:
          kind: CronJob
          apiVersion: batch/v1
          name: nessie-gc
          namespace: nessie-ns
      - equal:
          path: spec.schedule
          value: "0 3 * * *"
      # The GC image tag defaults to the chart version, so assert the repository
      # prefix rather than pinning a specific release number.
      - matchRegex:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/projectnessie/nessie-gc:"
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: nessie
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: gc
      # GC pods must NOT match the Nessie Service selector (name + instance), so
      # the pod-template name label is GC-specific.
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["app.kubernetes.io/name"]
          value: nessie-gc
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels["app.kubernetes.io/component"]
          value: gc
      # GC pods inherit the chart's hardened security contexts so they run in
      # restricted Pod Security namespaces.
      - equal:
          path: spec.jobTemplate.spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
  - it: should honor custom image repository and tag
    set:
      gc:
        enabled: true
        args: [ "gc" ]
        image:
          repository: example.com/custom-gc
          tag: "1.2.3"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: example.com/custom-gc:1.2.3
  - it: should flow through args, env, resources, concurrencyPolicy and serviceAccountName
    set:
      gc:
        enabled: true
        concurrencyPolicy: Replace
        serviceAccountName: nessie-gc-sa
        args: [ "gc" ]
        extraArgs: [ "--inmemory" ]
        env:
          - name: NESSIE_URI
            value: http://nessie:19120/api/v2
        resources:
          limits:
            cpu: "500m"
            memory: 256Mi
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Replace
      - equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: nessie-gc-sa
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].args
          value: [ "gc", "--inmemory" ]
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].env[0].name
          value: NESSIE_URI
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits.cpu
          value: "500m"
  - it: should fail rendering when gc.enabled is true but schedule is empty
    set:
      gc:
        enabled: true
        schedule: ""
        args: [ "gc" ]
    asserts:
      - failedTemplate:
          errorMessage: gc.schedule is required when gc.enabled is true
  - it: should fail rendering when gc.enabled is true but no command or args are provided
    set:
      gc:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: gc.args (or gc.command/gc.extraArgs) must specify the GC subcommand to run when gc.enabled is true
