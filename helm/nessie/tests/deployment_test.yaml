release:
  name: nessie
  namespace: nessie-ns

templates:
  - deployment.yaml
  - configmap.yaml

tests:
  - it: should not add extra init containers by default
    asserts:
      - notExists:
          path: spec.template.spec.initContainers
        template: deployment.yaml
  - it: should add extra init containers
    set:
      extraInitContainers:
        - name: init-container
          image: busybox
          command: [ 'sh', '-c', 'echo "hello world"' ]
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: init-container
            image: busybox
            command: [ 'sh', '-c', 'echo "hello world"' ]
        template: deployment.yaml
  - it: should not add extra containers by default
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1
        template: deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].name
          value: nessie
        template: deployment.yaml
  - it: should add extra containers
    set:
      extraContainers:
        - name: sidecar-container
          image: busybox
          command: [ 'sh', '-c', 'echo "hello world"' ]
    asserts:
      - contains:
          path: spec.template.spec.containers
          content:
            name: sidecar-container
            image: busybox
            command: [ 'sh', '-c', 'echo "hello world"' ]
        template: deployment.yaml
  - it: should add multiple extra containers
    set:
      extraContainers:
        - name: sidecar-one
          image: busybox
          command: [ 'sh', '-c', 'echo "one"' ]
        - name: sidecar-two
          image: nginx
    asserts:
      - contains:
          path: spec.template.spec.containers
          content:
            name: sidecar-one
            image: busybox
            command: [ 'sh', '-c', 'echo "one"' ]
        template: deployment.yaml
      - contains:
          path: spec.template.spec.containers
          content:
            name: sidecar-two
            image: nginx
        template: deployment.yaml
